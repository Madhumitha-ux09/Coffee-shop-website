<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/HtmlTutorial/signup.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="signup-box">
    <h2>Sign up</h2>
    <form method="post" action="/HtmlTutorial/signup.php">
      <div class="input-box">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Username" required>
      </div>
      <div class="input-box">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="Email" required>
      </div>
      <div class="input-box">
        <i class="fas fa-map-marker-alt"></i>
        <input type="text" name="address" placeholder="Address" required>
      </div>
      <div class="input-box">
        <i class="fas fa-phone"></i>
        <input type="tel" name="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" required>
      </div>
      <div class="input-box">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>
      <button type="submit" class="signup-btn">SIGN UP</button>
    </form>
    <p>Or Sign in with social platform</p>
    <div class="social-icons">
      <i class="fab fa-facebook-f"></i>
      <i class="fab fa-twitter"></i>
      <i class="fab fa-google"></i>
      <i class="fab fa-linkedin-in"></i>
      <p>Already have an account? <a href="/HtmlTutorial/signin.html">Sign in</a></p>
    </div>
  </div>
</body>
</html>
